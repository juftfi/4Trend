# ══════════════════════════════════════════════════════════════════════
# 4Trend — Nginx configuration
# Replace `your-domain.com` with your actual domain
# ══════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name your-domain.com www.your-domain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-domain.com www.your-domain.com;

    root /var/www/flap-trending;
    index index.html;

    # SSL — replace with your cert paths (e.g. Let's Encrypt)
    ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Serve SPA — all routes fall through to index.html
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Cache compiled assets (content-hashed filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API proxy — point to your backend API server
    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # four.meme GraphQL proxy
    location /flap-gql {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # Moralis API proxy
    location /moralis-api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    # Bot trending proxy
    location /bot-trending {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}
